name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build RevitClaudePlugIn
        run: dotnet publish src/RevitClaudePlugIn/RevitClaudePlugIn.csproj -c Release -o dist/RevitClaudeConnector --no-self-contained

      - name: Build BuiltInTools
        run: dotnet build src/BuiltInTools/BuiltInTools.csproj -c Release

      - name: Stage artifacts
        shell: pwsh
        run: |
          Copy-Item src/BuiltInTools/bin/Release/net8.0-windows/BuiltInTools.dll dist/RevitClaudeConnector/Tools/Packages/BuiltIn/runners/ -Force
          Copy-Item src/BuiltInTools/Schemas dist/RevitClaudeConnector/Tools/Packages/BuiltIn/Schemas -Recurse -Force
          Copy-Item src/BuiltInTools/manifest.json dist/RevitClaudeConnector/Tools/Packages/BuiltIn/
          Get-ChildItem dist/RevitClaudeConnector/Resources -File | Move-Item -Destination dist/RevitClaudeConnector/ -Force
          Remove-Item dist/RevitClaudeConnector/Resources -Recurse -Force
          Copy-Item src/RevitClaudePlugIn/Resources/plugin_settings.json dist/RevitClaudeConnector/
          Copy-Item src/RevitClaudePlugIn/Resources/RevitClaudeConnector.addin dist/
          New-Item -ItemType Directory -Path dist/server -Force | Out-Null
          Copy-Item src/Connector.Mcp.Server/Revit.Claude.Connector.Mcp.Server.mcpb dist/server/
          Set-Content dist/INSTALL.md @"
          # Revit Claude Connector ${{ github.ref_name }}

          For full installation instructions, visit:
          https://github.com/IbrahimFahdah/revit-claude-mcp/blob/main/docs/guide/installation.md
          "@

      - name: Create release archive
        shell: pwsh
        run: Compress-Archive -Path dist\* -DestinationPath "revit-claude-connector-${{ github.ref_name }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: revit-claude-connector-${{ github.ref_name }}.zip
          generate_release_notes: true
